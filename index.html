<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK | Siyah Altın Ses Stüdyosu</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0a0a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* ANA PANEL */
.box {
    width: 92%;
    max-width: 520px;
    background: #121212;
    padding: 25px;
    border-radius: 18px;
    box-shadow: 0 0 25px rgba(255, 215, 0, 0.15);
    border: 1px solid rgba(255, 215, 0, 0.2);
}

/* LOGO */
.logo {
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    color: gold;
    margin-bottom: 5px;
    letter-spacing: 3px;
}

.sub {
    text-align: center;
    font-size: 12px;
    color: #aaa;
    margin-bottom: 20px;
}

/* TEXTAREA */
textarea {
    width: 100%;
    height: 120px;
    border-radius: 12px;
    border: none;
    padding: 10px;
    font-size: 14px;
    background: #1e1e1e;
    color: white;
}

/* INPUTLAR */
select, input {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #1e1e1e;
    color: white;
}

/* BUTONLAR */
.buttons {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.play {
    background: gold;
    color: black;
}

.stop {
    background: #ff3b3b;
    color: white;
}

.api {
    background: #4da6ff;
    color: white;
}

/* STATUS */
.status {
    text-align: center;
    margin-top: 10px;
    font-size: 12px;
    color: #aaa;
}

</style>
</head>

<body>

<div class="box">

<div class="logo">SK</div>
<div class="sub">Siyah Altın Ses Stüdyosu PRO</div>

<textarea id="text" placeholder="Metin yaz..."></textarea>

<select id="lang">
    <option value="tr-TR">🇹🇷 Türkçe</option>
    <option value="en-US">🇺🇸 English</option>
</select>

<label>Hız</label>
<input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">

<label>Ton</label>
<input type="range" id="pitch" min="0" max="2" step="0.1" value="1">

<div class="buttons">
<button class="play" onclick="playLocal()">▶ SES</button>
<button class="stop" onclick="stop()">⏹</button>
<button class="api" onclick="aiVoice()">⚡ AI SES</button>
</div>

<div class="status" id="status">Hazır</div>

</div>

<script>

/* =========================
   NORMAL SES (ÇALIŞIR)
========================= */
function playLocal() {
    let text = document.getElementById("text").value;
    if (!text) return;

    speechSynthesis.cancel();

    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = document.getElementById("lang").value;
    speech.rate = document.getElementById("rate").value;
    speech.pitch = document.getElementById("pitch").value;

    speechSynthesis.speak(speech);

    document.getElementById("status").innerText = "Normal ses çalışıyor";
}

/* DURDUR */
function stop() {
    speechSynthesis.cancel();
}

/* =========================
   AI SES (API HAZIRLIK)
========================= */
function aiVoice() {

    let text = document.getElementById("text").value;
    if (!text) return;

    document.getElementById("status").innerText = "AI ses hazırlanıyor...";

    /* BURAYA GERÇEK API BAĞLANACAK */

    setTimeout(() => {
        document.getElementById("status").innerText =
        "AI sistem bağlı değil (API gerekli)";
        alert("AI ses için API bağlanacak (sonraki adım)");
    }, 1000);
}

</script>

</body>
</html>
