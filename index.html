<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SK AI VOICE STUDIO</title>
</head>

<body style="background:#111;color:#d4af37;text-align:center;font-family:Arial">

<h1>🎤 SK AI SES KLON STÜDYO</h1>

<textarea id="text" style="width:80%;height:120px"></textarea>
<br><br>

<button onclick="generate()">🔊 SES ÜRET</button>

<br><br>

<audio id="audio" controls></audio>

<script>

async function generate(){

    const text = document.getElementById("text").value;

    const res = await fetch("http://localhost:3000/generate", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({text})
    });

    const data = await res.json();

    document.getElementById("audio").src = data.audio;
}

</script>

</body>
</html>
