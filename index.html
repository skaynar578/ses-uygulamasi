<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>ULTRA PRO MAX AI STUDIO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
    text-align:center;
}

.container{
    max-width:900px;
    margin:30px auto;
    padding:20px;
}

h1{color:#f5c542;}

.card{
    background:#1a1a1a;
    margin:15px 0;
    padding:20px;
    border-radius:12px;
}

textarea{
    width:100%;
    height:120px;
    border-radius:10px;
    padding:10px;
}

button{
    margin:5px;
    padding:10px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.green{background:#28a745;color:white;}
.blue{background:#007bff;color:white;}
.red{background:#dc3545;color:white;}
.purple{background:#6f42c1;color:white;}

.output{
    margin-top:10px;
    background:#000;
    padding:10px;
    border-radius:8px;
    min-height:40px;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 ULTRA PRO MAX AI STUDIO</h1>

<!-- CHAT + TTS -->
<div class="card">
<h3>🧠 AI Sesli Asistan</h3>

<textarea id="text" placeholder="Metin yaz..."></textarea><br>

<button class="green" onclick="tts()">🔊 Seslendir</button>
<button class="red" onclick="stop()">⛔ Durdur</button>
</div>

<!-- AUDIO → TEXT -->
<div class="card">
<h3>🎧 Ses → Metin (Ultra AI)</h3>

<input type="file" id="audio"><br>

<button class="blue" onclick="send()">🚀 AI Çevir</button>

<div class="output" id="result">Bekleniyor...</div>
</div>

<!-- MIC -->
<div class="card">
<h3>🎙️ Canlı Konuşma</h3>

<button class="purple" onclick="startMic()">Başlat</button>
<button class="red" onclick="stopMic()">Durdur</button>

<div class="output" id="mic">...</div>
</div>

</div>

<script>

// 🔊 TTS
function tts(){
    let t = document.getElementById("text").value;
    let u = new SpeechSynthesisUtterance(t);
    u.lang="tr-TR";
    u.rate=1;
    window.speechSynthesis.speak(u);
}

function stop(){
    window.speechSynthesis.cancel();
}

// 🎙️ MIC
let rec;

function startMic(){
    let SR = window.SpeechRecognition || window.webkitSpeechRecognition;

    rec = new SR();
    rec.lang="tr-TR";
    rec.continuous=true;

    rec.onresult=(e)=>{
        let t="";
        for(let i=e.resultIndex;i<e.results.length;i++){
            t+=e.results[i][0].transcript;
        }
        document.getElementById("mic").innerText=t;
    };

    rec.start();
}

function stopMic(){
    if(rec) rec.stop();
}

// 🎧 AI UPLOAD
async function send(){
    let file=document.getElementById("audio").files[0];

    if(!file){
        alert("Dosya seç!");
        return;
    }

    let form=new FormData();
    form.append("audio",file);

    document.getElementById("result").innerText="AI analiz ediyor...";

    let res=await fetch("http://localhost:3000/transcribe",{
        method:"POST",
        body:form
    });

    let data=await res.json();

    document.getElementById("result").innerText=
        data.text || data.error;
}

</script>

</body>
</html>
