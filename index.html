<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ses Stüdyosu PRO</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 90%;
    max-width: 500px;
    background: #1c1c1c;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(255,255,255,0.1);
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

textarea {
    width: 100%;
    height: 120px;
    border-radius: 10px;
    border: none;
    padding: 10px;
    font-size: 14px;
}

select, input {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

.buttons {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.play { background: #00ff99; }
.stop { background: #ff4d4d; color: white; }
.copy { background: #4da6ff; color: white; }

small {
    display: block;
    margin-top: 10px;
    text-align: center;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

<h1>🎤 SES STÜDYOSU PRO</h1>

<textarea id="text" placeholder="Yazı yaz..."></textarea>

<select id="lang">
    <option value="tr-TR">🇹🇷 Türkçe</option>
    <option value="en-US">🇺🇸 English</option>
</select>

<label>Hız</label>
<input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">

<label>Ton</label>
<input type="range" id="pitch" min="0" max="2" step="0.1" value="1">

<div class="buttons">
<button class="play" onclick="play()">▶ Çal</button>
<button class="stop" onclick="stop()">⏹ Dur</button>
<button class="copy" onclick="copyText()">📋 Kopyala</button>
</div>

<small>GitHub Pages PRO Voice Studio</small>

</div>

<script>

function play() {
    let text = document.getElementById("text").value;
    if (!text) return;

    speechSynthesis.cancel();

    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = document.getElementById("lang").value;
    speech.rate = document.getElementById("rate").value;
    speech.pitch = document.getElementById("pitch").value;

    speechSynthesis.speak(speech);
}

function stop() {
    speechSynthesis.cancel();
}

function copyText() {
    let text = document.getElementById("text");
    text.select();
    document.execCommand("copy");
    alert("Kopyalandı!");
}

</script>

</body>
</html>
