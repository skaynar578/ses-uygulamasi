<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SK Ses AI - TTS & STT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
    text-align:center;
}

.container{
    max-width:800px;
    margin:50px auto;
    padding:20px;
}

h1{
    color:#f5c542;
    margin-bottom:30px;
}

textarea{
    width:100%;
    height:120px;
    border:none;
    border-radius:10px;
    padding:15px;
    font-size:16px;
    outline:none;
}

button{
    margin:10px;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

.speak{
    background:#28a745;
    color:white;
}

.listen{
    background:#007bff;
    color:white;
}

.stop{
    background:#dc3545;
    color:white;
}

.output{
    margin-top:20px;
    padding:15px;
    background:#1a1a1a;
    border-radius:10px;
    min-height:60px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎤 SK SES AI STÜDYO</h1>

    <h3>✍️ Metinden Sese</h3>
    <textarea id="text" placeholder="Buraya yaz..."></textarea><br>

    <button class="speak" onclick="speakText()">🔊 Konuş</button>
    <button class="stop" onclick="stopSpeech()">⛔ Durdur</button>

    <hr style="margin:30px 0; border:1px solid #333;">

    <h3>🎙️ Sesten Metne</h3>

    <button class="listen" onclick="startListening()">🎤 Dinlemeyi Başlat</button>
    <button class="stop" onclick="stopListening()">⛔ Durdur</button>

    <div class="output" id="output">Sonuç burada görünecek...</div>
</div>

<script>
// -------------------- METİNDEN SESE --------------------
function speakText(){
    let text = document.getElementById("text").value;

    if(text.trim() === ""){
        alert("Bir şey yazmalısın!");
        return;
    }

    let speech = new SpeechSynthesisUtterance();
    speech.text = text;
    speech.lang = "tr-TR";
    speech.rate = 1;
    speech.pitch = 1;

    window.speechSynthesis.speak(speech);
}

function stopSpeech(){
    window.speechSynthesis.cancel();
}

// -------------------- Sesten Metne --------------------
let recognition;

function startListening(){
    let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if(!SpeechRecognition){
        alert("Tarayıcın ses tanımayı desteklemiyor!");
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = "tr-TR";
    recognition.continuous = true;

    recognition.onresult = function(event){
        let transcript = "";

        for(let i = event.resultIndex; i < event.results.length; i++){
            transcript += event.results[i][0].transcript;
        }

        document.getElementById("output").innerText = transcript;
    };

    recognition.start();
}

function stopListening(){
    if(recognition){
        recognition.stop();
    }
}
</script>

</body>
</html>
