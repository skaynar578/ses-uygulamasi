<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SK PRO AI</title>
</head>

<body style="background:#111;color:#d4af37;text-align:center;font-family:Arial">

<h1>🎤 SK PRO AI</h1>

<textarea id="lyrics" placeholder="Şarkı yaz..." style="width:80%;height:120px"></textarea>

<br><br>

<input id="style" placeholder="rap / arabesk / pop">

<br><br>

<button onclick="generate()">🎵 ÜRET</button>

<p id="status"></p>

<h3>🎤 Vokal</h3>
<audio id="voice" controls></audio>

<h3>🎵 Beat</h3>
<audio id="beat" controls></audio>

<script>

const API_URL = "http://localhost:3000/create";

async function generate(){

    const lyrics = document.getElementById("lyrics").value;
    const style = document.getElementById("style").value;
    const status = document.getElementById("status");

    status.innerText = "Üretiliyor...";

    try {

        const res = await fetch(API_URL, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({lyrics, style})
        });

        const data = await res.json();

        document.getElementById("voice").src = data.voice;
        document.getElementById("beat").src = data.beat;

        status.innerText = "Hazır ✔";

    } catch(err){
        status.innerText = "Hata: " + err.message;
    }
}

</script>

</body>
</html>
