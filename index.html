<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SK SES AI PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
    text-align:center;
}

.container{
    max-width:800px;
    margin:40px auto;
    padding:20px;
}

h1{
    color:#f5c542;
}

textarea{
    width:100%;
    height:120px;
    border:none;
    border-radius:10px;
    padding:15px;
    font-size:16px;
    outline:none;
}

button{
    margin:8px;
    padding:12px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

.speak{background:#28a745;color:white;}
.upload{background:#6f42c1;color:white;}
.stop{background:#dc3545;color:white;}

.box{
    margin-top:15px;
    padding:15px;
    background:#1a1a1a;
    border-radius:10px;
    min-height:50px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎤 SK SES AI PRO</h1>

<!-- METİNDEN SESE -->
<h3>✍️ Metinden Sese</h3>
<textarea id="text" placeholder="Metin yaz..."></textarea><br>

<button class="speak" onclick="textToSpeech()">🔊 Konuş</button>
<button class="stop" onclick="stopSpeech()">⛔ Durdur</button>

<hr style="margin:25px 0; border:1px solid #333;">

<!-- SES → METİN -->
<h3>🎧 Ses Dosyasını Metne Çevir</h3>

<input type="file" id="audioFile" accept="audio/*"><br>

<button class="upload" onclick="sendAudio()">🎧 Çevir</button>

<div class="box" id="status">Durum: bekliyor...</div>
<div class="box" id="result">Sonuç burada görünecek...</div>

</div>

<script>

// ---------------- METİN → SES ----------------
function textToSpeech(){
    let text = document.getElementById("text").value;

    if(!text){
        alert("Metin yaz!");
        return;
    }

    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "tr-TR";
    speech.rate = 1;

    window.speechSynthesis.speak(speech);
}

function stopSpeech(){
    window.speechSynthesis.cancel();
}

// ---------------- SES → METİN (BACKEND) ----------------
async function sendAudio(){

    let file = document.getElementById("audioFile").files[0];

    if(!file){
        document.getElementById("status").innerText = "❌ Dosya seçilmedi";
        return;
    }

    document.getElementById("status").innerText = "⏳ İşleniyor...";

    let formData = new FormData();
    formData.append("audio", file);

    try{
        let res = await fetch("http://localhost:3000/transcribe", {
            method:"POST",
            body: formData
        });

        let data = await res.json();

        if(data.error){
            document.getElementById("status").innerText = "❌ Hata: " + data.error;
            return;
        }

        document.getElementById("status").innerText = "✅ Tamamlandı";
        document.getElementById("result").innerText = data.text;

    } catch(err){
        document.getElementById("status").innerText = "❌ Server kapalı (node server.js)";
    }
}

</script>

</body>
</html>
