<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI SES PRO 2</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
    text-align:center;
    padding:20px;
}

h1{
    margin-bottom:15px;
}

textarea{
    width:90%;
    height:140px;
    padding:12px;
    font-size:16px;
    border-radius:10px;
    border:none;
    outline:none;
}

button{
    margin:5px;
    padding:12px 16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#1e90ff;
    color:white;
    font-weight:bold;
}

button:hover{
    background:#0066cc;
}

#status{
    margin-top:10px;
    font-size:14px;
    color:#aaa;
}

/* mini player */
#playerBox{
    position:fixed;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    background:#111;
    padding:10px;
    border-radius:12px;
    width:90%;
    max-width:450px;
    display:none;
    box-shadow:0 0 10px rgba(255,255,255,0.1);
}

audio{
    width:100%;
}
</style>
</head>

<body>

<h1>🎤 AI SES PRO 2</h1>

<textarea id="text" placeholder="Metin yaz..."></textarea>

<br>

<button onclick="generate()">▶ SES ÜRET</button>
<button onclick="stopAudio()">⏹ DUR</button>

<div id="status">Hazır</div>

<!-- PLAYER -->
<div id="playerBox">
    <audio id="audio" controls></audio>
</div>

<script>

const audio = document.getElementById("audio");
const playerBox = document.getElementById("playerBox");
const statusBox = document.getElementById("status");

async function generate(){

    let text = document.getElementById("text").value;

    if(!text){
        statusBox.innerText = "❌ Metin boş";
        return;
    }

    statusBox.innerText = "⏳ Ses üretiliyor...";

    try{
        const res = await fetch("/tts", {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({ text })
        });

        if(!res.ok){
            statusBox.innerText = "❌ Backend hatası (server açık mı?)";
            return;
        }

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);

        audio.src = url;
        audio.play();

        playerBox.style.display = "block";
        statusBox.innerText = "✅ Ses hazır";

    }catch(err){
        console.log(err);
        statusBox.innerText = "❌ Bağlantı hatası";
    }
}

function stopAudio(){
    audio.pause();
    audio.currentTime = 0;
    statusBox.innerText = "⏹ Durdu";
}

</script>

</body>
</html>
