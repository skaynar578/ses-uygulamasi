<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK | Siyah Altın AI Ses Stüdyosu</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.panel{
width:92%;
max-width:520px;
background:#121212;
padding:25px;
border-radius:18px;
border:1px solid gold;
box-shadow:0 0 30px rgba(255,215,0,0.2);
}

.logo{
text-align:center;
font-size:32px;
color:gold;
font-weight:bold;
letter-spacing:4px;
}

.sub{
text-align:center;
font-size:12px;
color:#aaa;
margin-bottom:15px;
}

textarea{
width:100%;
height:120px;
border-radius:10px;
border:none;
padding:10px;
background:#1e1e1e;
color:white;
}

select,input{
width:100%;
margin-top:10px;
padding:10px;
border-radius:10px;
border:none;
background:#1e1e1e;
color:white;
}

.buttons{
display:flex;
gap:10px;
margin-top:15px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.local{background:gold;color:black;}
.stop{background:#ff3b3b;color:white;}
.ai{background:#4da6ff;color:white;}

.status{
text-align:center;
margin-top:10px;
font-size:12px;
color:#aaa;
}
</style>
</head>

<body>

<div class="panel">

<div class="logo">SK</div>
<div class="sub">Siyah Altın AI Ses Stüdyosu PRO</div>

<textarea id="text" placeholder="Metin yaz..."></textarea>

<select id="mode">
<option value="local">Normal Ses</option>
<option value="ai">AI Ses (API)</option>
</select>

<select id="lang">
<option value="tr-TR">Türkçe</option>
<option value="en-US">English</option>
</select>

<div class="buttons">
<button class="local" onclick="play()">▶ ÇAL</button>
<button class="stop" onclick="stop()">⏹</button>
<button class="ai" onclick="ai()">⚡ AI</button>
</div>

<div class="status" id="status">Hazır</div>

</div>

<script>

/* NORMAL SES */
function play(){
let text=document.getElementById("text").value;
if(!text)return;

speechSynthesis.cancel();

let s=new SpeechSynthesisUtterance(text);
s.lang=document.getElementById("lang").value;

speechSynthesis.speak(s);

document.getElementById("status").innerText="Normal ses çalışıyor";
}

/* STOP */
function stop(){
speechSynthesis.cancel();
document.getElementById("status").innerText="Durdu";
}

/* AI SES (GERÇEK API BAĞLANTISI BURAYA) */
async function ai(){

let text=document.getElementById("text").value;
if(!text)return;

document.getElementById("status").innerText="AI hazırlanıyor...";

/*
BURASI GERÇEK SES API NOKTASI
ÖRNEK: ElevenLabs API
*/

try{

// ŞU AN DEMO MOD
setTimeout(()=>{
document.getElementById("status").innerText=
"AI hazır değil → API KEY gerekli";
alert("Gerçek AI ses için API bağlanacak (son adım)");
},1000);

}catch(e){
document.getElementById("status").innerText="Hata";
}

}

</script>

</body>
</html>
