<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SK PRO AI VOICE</title>
</head>

<body style="background:#111;color:#d4af37;text-align:center;font-family:Arial">

<h1>🎤 SK PRO AI - SENİN SESİNLE ŞARKI</h1>

<textarea id="lyrics" placeholder="Şarkı sözleri..." style="width:80%;height:120px"></textarea>

<br><br>

<input id="style" placeholder="arabesk / rap / pop">

<br><br>

<button onclick="generate()">🎵 SÖYLE</button>

<p id="status"></p>

<h3>🎤 SENİN SESİN</h3>
<audio id="voice" controls></audio>

<h3>🎵 BEAT</h3>
<audio id="beat" controls></audio>

<script>

const API_URL = "https://SENIN-RENDER-URL.onrender.com/create";

async function generate(){

    const lyrics = document.getElementById("lyrics").value;
    const style = document.getElementById("style").value;
    const status = document.getElementById("status");

    status.innerText = "🎤 Ses üretiliyor...";

    try {

        const res = await fetch(API_URL, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({lyrics, style})
        });

        const data = await res.json();

        if(!res.ok) throw new Error(data.error);

        document.getElementById("voice").src = data.voice;
        document.getElementById("beat").src = data.beat;

        status.innerText = "✅ Hazır - Senin sesinle söylendi";

    } catch(err){
        status.innerText = "❌ " + err.message;
    }
}

</script>

</body>
</html>
