
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ses Uygulamam</title>
</head>
<body style="font-family:Arial;text-align:center;margin-top:50px;">

<h2>🎤 Ses Uygulaması</h2>

<textarea id="text" rows="6" cols="40" placeholder="Bir şey yaz..."></textarea>
<br><br>

<button onclick="konus()">Sesi Çal</button>

<script>
function konus() {
    let text = document.getElementById("text").value;
    if (!text) return;

    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "tr-TR";
    speech.rate = 1;

    speechSynthesis.speak(speech);
}
</script>

</body>
</html>
