<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SK PRO AI MÜZİK STÜDYO</title>
</head>

<body style="background:#0f0f0f;color:#d4af37;text-align:center;font-family:Arial">

<h1>🎤 SK PRO AI MÜZİK STÜDYO</h1>

<textarea id="lyrics" placeholder="Şarkı sözleri..." style="width:80%;height:120px"></textarea>

<br><br>

<input id="style" placeholder="arabesk / rap / pop">

<br><br>

<button onclick="generate()">🎵 ÜRET</button>

<p id="status"></p>

<br>

<h3>🎤 Vokal</h3>
<audio id="voice" controls></audio>

<h3>🎵 Beat</h3>
<audio id="beat" controls></audio>

<script>

// 🌍 BURAYA RENDER URL GELECEK
const API_URL = "https://SENIN-RENDER-URL.onrender.com/create";

async function generate(){

    const lyrics = document.getElementById("lyrics").value;
    const style = document.getElementById("style").value;
    const status = document.getElementById("status");

    status.innerText = "⏳ Üretiliyor...";

    try {

        const res = await fetch(API_URL, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({lyrics, style})
        });

        if(!res.ok){
            throw new Error("Server hatası: " + res.status);
        }

        const data = await res.json();

        document.getElementById("voice").src = data.voice;
        document.getElementById("beat").src = data.beat;

        status.innerText = "✅ Hazır";

    } catch(err){
        status.innerText = "❌ Hata: " + err.message;
    }
}

</script>

</body>
</html>
