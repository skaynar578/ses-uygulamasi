<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SK AI MÜZİK STÜDYO PRO</title>
</head>

<body style="background:#111;color:#d4af37;text-align:center;font-family:Arial">

<h1>🎤 SK AI MÜZİK STÜDYO PRO</h1>

<textarea id="lyrics" style="width:80%;height:120px"></textarea>
<br><br>

<input id="style" placeholder="arabesk / rap / pop">
<br><br>

<button onclick="send()">🎵 ÜRET</button>

<p id="out"></p>

<audio id="player" controls style="margin-top:20px;"></audio>

<script>

async function send(){

    const lyrics = document.getElementById("lyrics").value;
    const style = document.getElementById("style").value;

    const res = await fetch("http://localhost:3000/song", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({lyrics,style})
    });

    const data = await res.json();

    document.getElementById("out").innerText = "Hazır";

    document.getElementById("player").src = data.music;
}

</script>

</body>
</html>
