<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SK MÜZİK STÜDYO PRO</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0d0d0d;
    color:#d4af37;
    text-align:center;
}

h1{
    margin-top:20px;
}

textarea{
    width:80%;
    height:120px;
    margin-top:10px;
    border-radius:10px;
    padding:10px;
    font-size:14px;
}

input, button{
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}

button{
    background:#d4af37;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#b8902f;
}

#status{
    margin-top:15px;
    color:#aaa;
}
</style>
</head>

<body>

<h1>🎤 SK MÜZİK STÜDYO PRO</h1>

<p>Şarkı Sözü + Stil → AI Şarkı Üretimi</p>

<textarea id="lyrics" placeholder="Şarkı sözünü yaz..."></textarea>
<br>

<input id="style" placeholder="stil: arabesk / pop / rap">
<br>

<button onclick="createSong()">🎵 Şarkı Üret</button>

<p id="status"></p>

<script>

async function createSong(){

    let lyrics = document.getElementById("lyrics").value;
    let style = document.getElementById("style").value;
    let status = document.getElementById("status");

    if(!lyrics){
        alert("Şarkı sözü yaz!");
        return;
    }

    status.innerText = "⏳ Şarkı üretiliyor...";

    try{
        const res = await fetch("http://localhost:3000/song", {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                lyrics,
                style
            })
        });

        const data = await res.json();

        status.innerText = "✅ Hazır: " + data.url;

    }catch(err){
        console.log(err);
        status.innerText = "❌ Sunucu hatası";
    }
}

</script>

</body>
</html>
