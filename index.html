<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK SES STUDIO PRO</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
    text-align:center;
    padding:20px;
}

h1{margin-bottom:10px;}

textarea{
    width:90%;
    height:120px;
    padding:10px;
    font-size:16px;
    border-radius:10px;
}

select, input, button{
    margin:5px;
    padding:10px;
    border-radius:8px;
    border:none;
    font-size:14px;
}

button{
    cursor:pointer;
    background:#1e90ff;
    color:white;
}

button:hover{
    background:#0066cc;
}
</style>
</head>

<body>

<h1>🎤 SK SES STUDIO PRO</h1>

<textarea id="text" placeholder="Metin yaz..."></textarea>

<br>

<select id="lang">
    <option value="tr-TR">Türkçe</option>
    <option value="en-US">English</option>
</select>

<select id="voiceType">
    <option value="any">Otomatik</option>
</select>

<br>

<label>Hız</label>
<input type="range" id="rate" min="0.5" max="2" value="1" step="0.1">

<label>Ton</label>
<input type="range" id="pitch" min="0" max="2" value="1" step="0.1">

<br>

<button onclick="play()">▶ ÇAL</button>
<button onclick="pause()">⏸ DUR</button>
<button onclick="resume()">▶ DEVAM</button>
<button onclick="stop()">⏹ STOP</button>

<br>

<button onclick="record()">🔴 KAYIT BAŞLAT</button>
<button onclick="stopRecord()">⏹ KAYDI DURDUR & İNDİR</button>

<script>

let voices = [];
let mediaRecorder;
let chunks = [];

function loadVoices(){
    voices = speechSynthesis.getVoices();
}

speechSynthesis.onvoiceschanged = loadVoices;

function play(){

    let text = document.getElementById("text").value;
    if(!text) return;

    let lang = document.getElementById("lang").value;
    let rate = document.getElementById("rate").value;
    let pitch = document.getElementById("pitch").value;

    let speech = new SpeechSynthesisUtterance(text);

    speech.lang = lang;
    speech.rate = rate;
    speech.pitch = pitch;

    let v = voices.find(v => v.lang.includes(lang.split("-")[0]));

    if(v) speech.voice = v;

    speechSynthesis.cancel();
    speechSynthesis.speak(speech);
}

function pause(){
    speechSynthesis.pause();
}

function resume(){
    speechSynthesis.resume();
}

function stop(){
    speechSynthesis.cancel();
}

// 🔴 KAYIT (mikrofon + sistem sesi)
async function record(){

    let stream = await navigator.mediaDevices.getUserMedia({ audio:true });

    mediaRecorder = new MediaRecorder(stream);
    chunks = [];

    mediaRecorder.ondataavailable = e => {
        chunks.push(e.data);
    };

    mediaRecorder.onstop = e => {
        let blob = new Blob(chunks, { type:'audio/webm' });
        let url = URL.createObjectURL(blob);

        let a = document.createElement("a");
        a.href = url;
        a.download = "sk-ses-kayit.webm";
        a.click();
    };

    mediaRecorder.start();
    alert("Kayıt başladı");
}

function stopRecord(){
    if(mediaRecorder){
        mediaRecorder.stop();
    }
}

loadVoices();

</script>

</body>
</html>
