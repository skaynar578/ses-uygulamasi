<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>AI PRO SES 2.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0b0b0b,#111);
    color:white;
    text-align:center;
}

.container{
    max-width:900px;
    margin:30px auto;
    padding:20px;
}

h1{
    color:#f5c542;
    font-size:32px;
}

.card{
    background:#1a1a1a;
    padding:20px;
    border-radius:15px;
    margin:15px 0;
    box-shadow:0 0 10px rgba(255,255,255,0.05);
}

textarea{
    width:100%;
    height:120px;
    border-radius:10px;
    border:none;
    padding:12px;
    font-size:16px;
}

button{
    margin:6px;
    padding:12px 16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
}

.green{background:#28a745;color:white;}
.blue{background:#007bff;color:white;}
.red{background:#dc3545;color:white;}
.purple{background:#6f42c1;color:white;}
.orange{background:#ff9800;color:white;}

.output{
    margin-top:10px;
    padding:10px;
    background:#000;
    border-radius:8px;
    min-height:40px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎧 SK AI PRO SES 2.0 AYZ</h1>

<!-- METİN → SES -->
<div class="card">
<h3>✍️ Metin → AI Ses</h3>

<textarea id="text" placeholder="Metin yaz..."></textarea><br>

<button class="green" onclick="speak()">🔊 AI Seslendir</button>
<button class="red" onclick="stop()">⛔ Durdur</button>
</div>

<!-- MİKROFON → METİN -->
<div class="card">
<h3>🎙️ Gerçek Zamanlı Konuşma → Metin</h3>

<button class="blue" onclick="startMic()">🎤 Başlat</button>
<button class="red" onclick="stopMic()">⛔ Durdur</button>

<div class="output" id="micOut">Bekleniyor...</div>
</div>

<!-- SES DOSYASI -->
<div class="card">
<h3>🎧 Ses Dosyası</h3>

<input type="file" id="file" accept="audio/*"><br>

<button class="purple" onclick="load()">▶ Çal</button>
<button class="orange" onclick="download()">⬇ İndir</button>

<audio id="audio" controls style="width:100%;margin-top:10px;"></audio>
</div>

</div>

<script>

// 🔊 METİN → SES (AI TTS)
function speak(){
    let text = document.getElementById("text").value;

    let utter = new SpeechSynthesisUtterance(text);

    // daha doğal ses ayarı
    utter.lang = "tr-TR";
    utter.rate = 1;
    utter.pitch = 1.1;

    window.speechSynthesis.speak(utter);
}

function stop(){
    window.speechSynthesis.cancel();
}

// 🎙️ MİKROFON → METİN
let rec;

function startMic(){
    let SR = window.SpeechRecognition || window.webkitSpeechRecognition;

    rec = new SR();
    rec.lang = "tr-TR";
    rec.continuous = true;

    rec.onresult = (e)=>{
        let txt = "";
        for(let i=e.resultIndex;i<e.results.length;i++){
            txt += e.results[i][0].transcript;
        }
        document.getElementById("micOut").innerText = txt;
    };

    rec.start();
}

function stopMic(){
    if(rec) rec.stop();
}

// 🎧 SES DOSYASI
let url;

function load(){
    let file = document.getElementById("file").files[0];
    if(!file){
        alert("Dosya seç!");
        return;
    }

    url = URL.createObjectURL(file);
    document.getElementById("audio").src = url;
}

function download(){
    if(!url){
        alert("Önce yükle!");
        return;
    }

    let a = document.createElement("a");
    a.href = url;
    a.download = "ai-ses.mp3";
    a.click();
}

</script>

</body>
</html>
