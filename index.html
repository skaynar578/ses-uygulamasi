<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI SES PRO 2</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
    text-align:center;
    padding:20px;
}

h1{margin-bottom:10px;}

textarea{
    width:90%;
    height:140px;
    padding:10px;
    font-size:16px;
    border-radius:10px;
    border:none;
    outline:none;
}

select, input, button{
    margin:5px;
    padding:10px;
    border-radius:8px;
    border:none;
    font-size:14px;
}

button{
    cursor:pointer;
    background:#1e90ff;
    color:white;
}

button:hover{
    background:#0066cc;
}

.card{
    background:#161616;
    padding:15px;
    border-radius:12px;
    width:90%;
    margin:auto;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>🎤 AI SES PRO 2</h1>

<div class="card">

<textarea id="text" placeholder="Metin yaz..."></textarea>

<br>

<select id="voice">
    <option value="eleven">AI Ses (ElevenLabs)</option>
    <option value="browser">Tarayıcı Ses</option>
</select>

<br>

<label>Hız</label>
<input type="range" id="rate" min="0.5" max="2" value="1" step="0.1">

<label>Ton</label>
<input type="range" id="pitch" min="0" max="2" value="1" step="0.1">

<br>

<button onclick="generate()">▶ SES ÜRET</button>
<button onclick="playBrowser()">🧠 TARAYICI SES</button>
<button onclick="stop()">⏹ DUR</button>

<br><br>

<audio id="audio" controls style="width:90%;"></audio>

</div>

<script>

// =====================
// AI SES (backend)
// =====================
async function generate(){

    let text = document.getElementById("text").value;
    let voice = document.getElementById("voice").value;

    if(!text) return;

    if(voice === "eleven"){

        try{
            const res = await fetch("http://localhost:3000/tts", {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body: JSON.stringify({ text })
            });

            const blob = await res.blob();
            const url = URL.createObjectURL(blob);

            let audio = document.getElementById("audio");
            audio.src = url;
            audio.play();

        }catch(err){
            alert("AI ses hatası (backend açık mı?)");
        }

    } else {
        playBrowser();
    }
}

// =====================
// TARAYICI SES (fallback)
// =====================
function playBrowser(){

    let text = document.getElementById("text").value;
    if(!text) return;

    let rate = document.getElementById("rate").value;
    let pitch = document.getElementById("pitch").value;

    let speech = new SpeechSynthesisUtterance(text);

    speech.lang = "tr-TR";
    speech.rate = rate;
    speech.pitch = pitch;

    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(speech);
}

// =====================
// DUR
// =====================
function stop(){
    window.speechSynthesis.cancel();

    let audio = document.getElementById("audio");
    audio.pause();
    audio.currentTime = 0;
}

</script>

</body>
</html>
