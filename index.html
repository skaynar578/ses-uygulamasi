<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SK AI SES STÜDYO (Node’suz)</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
    text-align:center;
}

.container{
    max-width:800px;
    margin:40px auto;
    padding:20px;
}

h1{color:#f5c542;}

textarea{
    width:100%;
    height:120px;
    border:none;
    border-radius:10px;
    padding:10px;
    font-size:16px;
}

button{
    margin:8px;
    padding:12px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.green{background:#28a745;color:white;}
.blue{background:#007bff;color:white;}
.red{background:#dc3545;color:white;}
.purple{background:#6f42c1;color:white;}

.box{
    margin-top:15px;
    padding:15px;
    background:#1a1a1a;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎤 SK AI SES STÜDYO</h1>

<!-- METİN → SES -->
<h3>✍️ Metin → Ses</h3>
<textarea id="text" placeholder="Metin yaz..."></textarea><br>

<button class="green" onclick="speak()">🔊 Konuş</button>
<button class="red" onclick="stop()">⛔ Durdur</button>

<hr>

<!-- SES → METİN (mikrofon) -->
<h3>🎙️ Mikrofon → Metin</h3>

<button class="blue" onclick="startMic()">🎤 Başlat</button>
<button class="red" onclick="stopMic()">⛔ Durdur</button>

<div class="box" id="micText">Sonuç burada...</div>

<hr>

<!-- SES DOSYASI -->
<h3>🎧 Ses Dosyası Yükle</h3>
<input type="file" id="file" accept="audio/*"><br>

<button class="purple" onclick="playFile()">▶ Çal</button>
<button class="green" onclick="downloadFile()">⬇ İndir</button>

<audio id="audio" controls style="width:100%;margin-top:10px;"></audio>

</div>

<script>

// 🔊 METİN → SES
function speak(){
    let text = document.getElementById("text").value;

    let utter = new SpeechSynthesisUtterance(text);
    utter.lang = "tr-TR";

    window.speechSynthesis.speak(utter);
}

function stop(){
    window.speechSynthesis.cancel();
}

// 🎙️ MİKROFON → METİN
let rec;

function startMic(){
    let SR = window.SpeechRecognition || window.webkitSpeechRecognition;

    rec = new SR();
    rec.lang = "tr-TR";
    rec.continuous = true;

    rec.onresult = function(e){
        let text = "";
        for(let i=e.resultIndex;i<e.results.length;i++){
            text += e.results[i][0].transcript;
        }
        document.getElementById("micText").innerText = text;
    };

    rec.start();
}

function stopMic(){
    if(rec) rec.stop();
}

// 🎧 SES DOSYASI
let url = null;

function playFile(){
    let file = document.getElementById("file").files[0];

    if(!file){
        alert("Dosya seç!");
        return;
    }

    url = URL.createObjectURL(file);
    document.getElementById("audio").src = url;
}

function downloadFile(){
    if(!url){
        alert("Önce dosya yükle!");
        return;
    }

    let a = document.createElement("a");
    a.href = url;
    a.download = "ses.mp3";
    a.click();
}

</script>

</body>
</html>
