<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SK STÜDYO PRO</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0d0d0d;
    color:#d4af37;
    text-align:center;
}

textarea{
    width:80%;
    height:120px;
    margin-top:20px;
    padding:10px;
}

input, button{
    margin-top:10px;
    padding:10px;
}

button{
    background:#d4af37;
    border:none;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>🎤 SK MÜZİK STÜDYO</h1>

<textarea id="lyrics" placeholder="Şarkı sözünü yaz..."></textarea>
<br>

<input id="style" placeholder="stil (arabesk / pop)">
<br>

<button onclick="createSong()">🎵 Şarkı Üret</button>

<p id="status"></p>

<script>

async function createSong(){

    let lyrics = document.getElementById("lyrics").value;
    let style = document.getElementById("style").value;
    let status = document.getElementById("status");

    status.innerText = "Üretiliyor...";

    const res = await fetch("http://localhost:3000/song", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            lyrics,
            style
        })
    });

    const data = await res.json();

    status.innerText = "Hazır: " + data.url;
}

</script>

</body>
</html>
