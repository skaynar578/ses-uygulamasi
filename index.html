<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SK SES STÜDYOSU v1</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0d0d0d;
    color:#d4af37;
    text-align:center;
}

.header{
    padding:20px;
    font-size:26px;
    font-weight:bold;
    border-bottom:2px solid #d4af37;
}

.box{
    margin-top:40px;
}

textarea{
    width:80%;
    height:120px;
    border-radius:10px;
    padding:10px;
    font-size:16px;
}

select, input, button{
    margin-top:10px;
    padding:10px;
    border-radius:8px;
    border:none;
    font-size:14px;
}

button{
    background:#d4af37;
    color:black;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#b8902f;
}

.logo{
    font-size:18px;
    margin-top:10px;
    color:#888;
}
</style>
</head>

<body>

<div class="header">
🎤 SK SES STÜDYOSU v1
<div class="logo">Siyah Altın Prodüksiyon · SK</div>
</div>

<div class="box">

<textarea id="text" placeholder="Buraya yaz..."></textarea><br>

<br>

<label>🇹🇷 Türkçe Ses</label><br>
<select id="voice">
    <option value="21m00Tcm4TlvDq8ikWAM">Erkek Ses</option>
    <option value="EXAVITQu4vr4xnSDxMaL">Kadın Ses</option>
</select>

<br><br>

<label>Hız</label><br>
<input type="range" id="rate" min="0.5" max="2" value="1" step="0.1">

<br><br>

<button onclick="playVoice()">▶ Sesi Çal</button>

</div>

<script>

const API_KEY = "BURAYA_API_KEY_YAPISTIR"; // <<< BURAYA KENDİ KEYİNİ KOY

async function playVoice(){

    let text = document.getElementById("text").value;
    let voice = document.getElementById("voice").value;
    let rate = document.getElementById("rate").value;

    if(!text){
        alert("Bir şey yaz!");
        return;
    }

    const response = await fetch("https://api.elevenlabs.io/v1/text-to-speech/" + voice, {
        method: "POST",
        headers: {
            "xi-api-key": API_KEY,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            text: text,
            model_id: "eleven_multilingual_v2",
            voice_settings: {
                stability: 0.5,
                similarity_boost: 0.5,
                style: 0.5,
                use_speaker_boost: true
            }
        })
    });

    const audioBlob = await response.blob();
    const audioUrl = URL.createObjectURL(audioBlob);

    let audio = new Audio(audioUrl);
    audio.play();
}

</script>

</body>
</html>
