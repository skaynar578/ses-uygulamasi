<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SK SES STÜDYOSU v2</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0d0d0d;
    color:#d4af37;
    text-align:center;
}

.header{
    padding:20px;
    font-size:26px;
    font-weight:bold;
    border-bottom:2px solid #d4af37;
}

.logo{
    font-size:14px;
    color:#888;
    margin-top:5px;
}

.container{
    margin-top:40px;
}

textarea{
    width:80%;
    height:120px;
    padding:10px;
    border-radius:10px;
    font-size:16px;
}

select, input, button{
    margin-top:10px;
    padding:10px;
    border-radius:8px;
    border:none;
}

button{
    background:#d4af37;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#b8902f;
}

#status{
    margin-top:15px;
    color:#aaa;
}
</style>
</head>

<body>

<div class="header">
🎤 SK SES STÜDYOSU v2
<div class="logo">Siyah Altın Prodüksiyon · SK</div>
</div>

<div class="container">

<textarea id="text" placeholder="Buraya yaz..."></textarea>
<br><br>

<label>🇹🇷 Türkçe Ses</label><br>
<select id="voice">
    <option value="21m00Tcm4TlvDq8ikWAM">Erkek Ses</option>
    <option value="EXAVITQu4vr4xnSDxMaL">Kadın Ses</option>
</select>

<br><br>

<label>Hız</label><br>
<input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">
<div id="speedVal">1.0x</div>

<br><br>

<button onclick="playVoice()">▶ Sesi Çal</button>

<div id="status"></div>

</div>

<script>

// 🔑 
const API_KEY sk_f4cc940330ba1ce8d84917b0db7a6557d9934bdc7db320e5

document.getElementById("speed").oninput = function(){
    document.getElementById("speedVal").innerText = this.value + "x";
};

async function playVoice(){

    let text = document.getElementById("text").value;
    let voice = document.getElementById("voice").value;
    let speed = parseFloat(document.getElementById("speed").value);

    let status = document.getElementById("status");

    if(!text){
        alert("Bir şey yaz!");
        return;
    }

    status.innerText = "⏳ Ses oluşturuluyor...";

    try {
        const response = await fetch(
            "https://api.elevenlabs.io/v1/text-to-speech/" + voice,
            {
                method: "POST",
                headers: {
                    "xi-api-key": API_KEY,
                    "Content-Type": "application/json",
                    "Accept": "audio/mpeg"
                },
                body: JSON.stringify({
                    text: text,
                    model_id: "eleven_multilingual_v2",
                    voice_settings: {
                        stability: 0.5,
                        similarity_boost: 0.5,
                        speed: speed
                    }
                })
            }
        );

        if(!response.ok){
            const err = await response.text();
            console.log(err);
            status.innerText = "❌ API Hatası: " + err;
            return;
        }

        const audioBlob = await response.blob();
        const audioUrl = URL.createObjectURL(audioBlob);

        let audio = new Audio(audioUrl);

        audio.onended = () => {
            status.innerText = "✅ Hazır";
        };

        status.innerText = "▶ Oynatılıyor...";
        audio.play();

    } catch (error) {
        console.log(error);
        status.innerText = "❌ Bağlantı hatası: " + error.message;
    }
}

</script>

</body>
</html>
